<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ZealPHP SSE Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    #log { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; min-height: 200px; background: #fafafa; font-family: monospace; }
    .event { margin: 4px 0; }
    .event.open { color: #080; }
    .event.tick { color: #008; }
    .event.done { color: #800; font-weight: bold; }
    .event.error { color: #c00; }
    button { padding: .5rem 1.2rem; margin: .5rem .3rem; border-radius: 4px; border: 1px solid #aaa; cursor: pointer; }
    #status { font-size: .85rem; color: #666; margin-bottom: .5rem; }
    .badge { display:inline-block; background:#e0f0ff; color:#005; border-radius:4px; padding:2px 8px; font-size:.8rem; }
  </style>
</head>
<body>
  <h1>ZealPHP SSE Demo <span class="badge">EventSource</span></h1>
  <p>Connects to <code>/examples/sse</code> and displays each event as it arrives.</p>
  <div id="status">Not connected</div>
  <button onclick="start()">Connect</button>
  <button onclick="stop()">Disconnect</button>
  <button onclick="clear()">Clear</button>
  <div id="log"></div>

  <script>
    let source = null;

    function log(text, cls = '') {
      const el = document.createElement('div');
      el.className = 'event ' + cls;
      el.textContent = new Date().toLocaleTimeString() + ' — ' + text;
      document.getElementById('log').appendChild(el);
    }

    function start() {
      if (source) source.close();
      document.getElementById('status').textContent = 'Connecting...';
      source = new EventSource('/examples/sse');

      source.addEventListener('open', e => {
        const d = JSON.parse(e.data);
        document.getElementById('status').textContent = 'Connected';
        log(d.message, 'open');
      });

      source.addEventListener('tick', e => {
        const d = JSON.parse(e.data);
        log(`[tick ${d.tick}] ${d.message} @ ${d.time}`, 'tick');
      });

      source.addEventListener('done', e => {
        const d = JSON.parse(e.data);
        log(d.message, 'done');
        document.getElementById('status').textContent = 'Stream complete';
        source.close();
      });

      source.onerror = () => {
        log('Connection error or stream closed.', 'error');
        document.getElementById('status').textContent = 'Disconnected';
      };
    }

    function stop() {
      if (source) { source.close(); source = null; }
      document.getElementById('status').textContent = 'Disconnected';
      log('Manually disconnected.', 'error');
    }

    function clear() {
      document.getElementById('log').innerHTML = '';
    }
  </script>
</body>
</html>
