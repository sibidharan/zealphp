name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      # composer audit — runs the CVE check against all installed dependency
      # versions in composer.lock. Free + built-in to composer 2.4+. Catches
      # vulnerable transitive deps that PHPStan can't see (e.g., a CVE in
      # openswoole/core or in a psr/* package). Runs at install-time so it
      # never reaches production. --no-dev skips dev-only deps; we want the
      # check on dev too because CI exposure matters.
      - name: Composer audit (CVE check)
        run: composer audit --abandoned=report

      # Badge sync — fail fast if .github/badges/phpstan.json claims a different
      # level than phpstan.neon. The shields.io endpoint badge in README reads
      # that JSON, so a mismatch silently misrepresents the project's actual
      # static-analysis posture. Cheap check; runs before any heavier job.
      - name: Verify PHPStan badge matches phpstan.neon
        run: |
          set -euo pipefail
          NEON_LEVEL=$(awk '/^[[:space:]]*level:/ {print $2; exit}' phpstan.neon | tr -d '[:space:]')
          BADGE_LEVEL=$(python3 -c "import json,re; m=json.load(open('.github/badges/phpstan.json'))['message']; print(re.search(r'\d+', m).group())")
          echo "phpstan.neon level: $NEON_LEVEL"
          echo "badge JSON level:   $BADGE_LEVEL"
          if [ "$NEON_LEVEL" != "$BADGE_LEVEL" ]; then
            echo "::error::PHPStan badge (level $BADGE_LEVEL) does not match phpstan.neon (level $NEON_LEVEL). Update .github/badges/phpstan.json."
            exit 1
          fi

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: openswoole, uopz
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  phpunit:
    name: phpunit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            coverage: 'xdebug'
            upload-coverage: true
            experimental: false
          # 8.4 runs without coverage — Xdebug + curl interaction caused the
          # test_chat_consecutive_requests_work flake. 8.3 is already the only
          # Codecov uploader so no signal is lost.
          - php: '8.4'
            coverage: 'none'
            upload-coverage: false
            experimental: false
          # 8.5 is pre-GA at time of writing. openswoole/uopz binaries via
          # shivammathur/setup-php may not be available yet; continue-on-error
          # so a missing-extension failure doesn't block master.
          - php: '8.5'
            coverage: 'none'
            upload-coverage: false
            experimental: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openswoole, uopz
          coverage: ${{ matrix.coverage }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Start ZealPHP
        env:
          ZEALPHP_COMPRESSION_MIDDLEWARE: '1'
          ZEALPHP_HTTP_COMPRESSION: '0'
        run: |
          php app.php >/tmp/zealphp-server.log 2>&1 &
          echo $! > /tmp/zealphp-server.pid
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          cat /tmp/zealphp-server.log
          exit 1

      - name: Run tests (with coverage)
        if: matrix.coverage == 'xdebug'
        run: ./vendor/bin/phpunit --coverage-clover build/logs/clover.xml

      - name: Run tests (no coverage)
        if: matrix.coverage == 'none'
        run: ./vendor/bin/phpunit

      - name: Upload coverage to Codecov
        if: matrix.upload-coverage
        uses: codecov/codecov-action@v6
        with:
          files: build/logs/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
