# Codecov configuration — enforces the coverage floor so it can't silently erode.
# The combined unit + integration clover is uploaded by .github/workflows/tests.yml.
coverage:
  status:
    project:
      default:
        # Whole-project floor. CI's Codecov check fails if coverage drops below
        # this (the threshold absorbs measurement noise from the merged
        # unit+integration passes).
        target: 80%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        # New/changed lines must be well covered — keeps regressions from
        # sneaking in under the project average.
        target: 80%
        threshold: 5%

# Don't count test scaffolding, vendored code, or the demo site against coverage.
# Subprocess entry points (cgi_worker.php, pool_worker.php) are excluded for the
# same reason phpstan.neon excludes them: they run inside forked PHP CLI processes
# spawned via proc_open(), and xdebug/pcov coverage tracking lives in the parent
# process — lines executed inside the subprocess can't be counted by coverage
# tools. Same rationale for the scripts/ benches: standalone diagnostic harnesses
# that drive WorkerPool/cgi_worker directly (no test harness wraps them).
ignore:
  - "tests/**"
  - "vendor/**"
  - "examples/**"
  - "bench/**"
  - "public/**"
  - "template/**"
  - "route/**"
  - "api/**"
  - "task/**"
  - "scripts/**"
  - "src/cgi_worker.php"
  - "src/pool_worker.php"
  - "app.php"

comment:
  layout: "reach, diff, flags, files"
  require_changes: false
